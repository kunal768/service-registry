apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: service-registry:latest
          imagePullPolicy: Never
          command: ["uvicorn", "service.app:app", "--host", "0.0.0.0", "--port", "8001"]
          env:
            - name: SERVICE_NAME
              value: "user-service"
            - name: PORT
              value: "8001"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REGISTRY_URL
              value: "http://service-registry:5001"
            - name: HEARTBEAT_INTERVAL_SECONDS
              value: "10"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8001
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: user-service
---
