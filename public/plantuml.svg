@startuml
title Service Discovery Demo

actor Client
node Registry as SR
node "Service Instance (8001)" as S1
node "Service Instance (8002)" as S2

S1 - -> SR : POST /register\n(service,address)
S2 - -> SR : POST /register\n(service,address)

Client - -> SR : GET /discover/echo-service
SR - -> Client : instances[]\n(2 addresses)

Client - -> S1 : GET /work\n(random choice)
Client - -> S2 : GET /work\n(random choice)
@enduml

